# Creative GeekStack Flow — project config
# The init script fills these defaults; edit as the project evolves.

# Workspace version — MANAGED BY `geekstackflow init` / `upgrade`. Do not hand-edit.
#   tcgflow_version  : the tool semver that last touched this workspace (informational).
#   workspace_schema : layout version; `upgrade` runs migrations keyed off it. See ADR 0021.
tcgflow_version: "0.0.0"             # stamped by init
workspace_schema: 5                  # current layout (schema 5 = hooks/ + Trusted Commands; 4 = runs/ + orchestrator.roles)

project:
  name: ""                          # filled by init
  type: existing                    # existing | new
  workspace_kind: single            # 'single' | 'multi-project' — init detects and sets
  primary_stack: ""                 # used when workspace_kind == 'single'
  package_manager: pnpm             # used when workspace_kind == 'single'

# Multi-project workspaces (workspace_kind: multi-project) — init auto-detects sub-projects
# by scanning top-level directories for project signal files (package.json, *.csproj,
# Pulumi.yaml, Cargo.toml, pyproject.toml, go.mod, Gemfile, pom.xml, composer.json).
# Edit names, stacks, or commands after init as needed.
projects: []
# Example entries (will be filled by init for multi-project workspaces):
#   - name: api
#     path: EnvironmentSampling.Api
#     stack: ".NET 10 + Marten + PostgreSQL"
#     package_manager: dotnet
#     test: "dotnet test"
#     lint: "dotnet format --verify-no-changes"
#   - name: spa
#     path: EnvironmentSampling.Spa
#     stack: "Vue 3 + Vuetify 3"
#     package_manager: pnpm
#     test: "pnpm test:unit"
#     lint: "pnpm lint"

memory:
  mode: local-first                 # local wins on conflict with global
  local_wiki: .tcgstackflow/wiki
  raw_staging: .tcgstackflow/raw
  global_memory: ~/.tcgstackflow/memory

skills:
  local_path: .tcgstackflow/skills
  global_path: ~/.tcgstackflow/skills
  strategy: symlink                 # symlink | copy

# Wiki search (qmd) — the MANDATORY discovery layer over the LLM-wiki and docs/ (ADR 0030).
# Installed + indexed by the `/tcgflow-init` AI command (a HIGH action: global npm + ~2GB models,
# permission-gated). init.js the SCRIPT stays dependency-free and does NOT install qmd.
# Complements (does not replace) wiki/index.md navigation; index.md is the always-current fallback.
wiki_search:
  engine: qmd                       # https://github.com/tobi/qmd — local hybrid (BM25 + vector + rerank)
  interface: cli                    # 'cli' is canonical/tool-portable; the qmd MCP (mcp.recommended) is an optional Claude convenience
  embed_on_ingest: true             # the Ingester re-embeds all collections after each ingest/lint
  mask: "*.md"                      # qmd indexes only Markdown (qmd collection add --mask)
  collections:                      # init registers these; a docs/ entry is added only when the directory exists
    - name: wiki
      path: .tcgstackflow/wiki      # mandatory
      # context: a one-line description set via `qmd context add qmd://wiki "..."` to improve retrieval (set by /tcgflow-init)
      context: "Project knowledge wiki — architecture, domain glossary, features, decisions (ADRs), operations. The authoritative AI-maintained memory."
    # - name: docs
    #   path: docs                  # added by /tcgflow-init when a docs/ dir is present (per sub-project in multi-project)
    #   context: "In-repo developer docs (READMEs, guides, /docs)."

# Orchestrator — per-role runner tool map (ADR 0025). The Cockpit Orchestrator launches
# the agent for each role using the tool named here. Default all-claude; set a role to
# 'codex' to spread cost once the Codex runner lands (currently deferred — Claude only).
# Optional keys (the Cockpit Settings tab can also write them; safe to hand-edit or delete):
#   budget_usd: 50              # spend guard — runs refuse to launch when est. spend exceeds it
#   auto_advance: true          # chain runs by default: coder → reviewer → tester → ingester
#   max_bounces: 1              # backward moves (review/test sent it back) before a chain stops
#   auto_ingest_on_pull: true   # the git post-merge hook (geekstackflow hooks) launches an
#                               # ingester run on new pull digests when the Cockpit is running
orchestrator:
  roles:
    planner: claude
    coder: claude
    reviewer: claude
    tester: claude
    ingester: claude
    refactorer: claude

governance:
  mode: strict                      # strict | relaxed
  permissions_file: .tcgstackflow/governance.md

tools:
  claude: true
  codex: false
  github: false                     # GitHub Copilot — writes .github/copilot-instructions.md + instructions/
  antigravity: false                # IDE-bound; not supported in V1

tempo:
  enabled: false                    # flip to true once cloudId is set
  provider: atlassian-mcp
  cloudId: ""                       # per-client; e.g. "9e2bd083-d1ed-490d-9206-bebb7f899881"
  admin_key: ""                     # quarterly key; e.g. "ADMIN-86"
  timezone: "+0800"                 # ISO offset
  work_start: "07:00"               # or "08:00"
  daily_hours: 8
  weekly_hours: 40
  preferred_chunk: "2-3h"
  max_chunk: "4h"
  submission_mode: approval         # approval | trust — default approval for safety

mcp:
  write_requires_approval: true
  recommended:                      # init can offer to wire these up
    - atlassian                     # Jira/Tempo worklog submission
    - qmd                           # local wiki search/re-rank
    - github                        # PR + issue operations
    - filesystem                    # file ops in sandboxed mode
  optional:
    - snyk                          # security/dependency findings
    - cypress                       # E2E results
    - datadog                       # production monitoring
    - sentry
